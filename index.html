<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <title>Sirius Token Web3</title>
    </head>
    <body>
        <h2 align="center">Interface do Sirius Token</h2>
        <div style="text-align: center;">
            <button id="connectButton">Conectar MetaMask (carteira)</button>
            <p id="accountArea">Aguardando conexão...</p>
        </div>

        <hr>

        <h3>Transferir Tokens</h3>
        <input type="text" id="toWhom" placeholder="Endereço do destinatário">
        <input type="number" id="amount" placeholder="Quantidade">
        <button id="transferButton">Transferir</button>
        
        <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js" type="application/javascript"></script>
        <script>
            const contractAddress = "0x931a72e850a262ce5774e527905A79987b920bE4";

            let contractABI;
            let signer;
            let contract;

            async function loadABI() {
                try {
                    const response = await fetch('./SiriusToken.json');
                    const data = await response.json();
                    contractABI = data.abi;
                    console.log("ABI carregado com sucesso");
                } catch (err) {
                    console.error("Erro ao carregar o arquivo JSON: ", err);
                }
            }

            async function connect() {
                if (window.ethereum) {
                    await window.ethereum.request({ method: 'eth_requestAccounts' });
                    const provider = new ethers.providers.Web3Provider(window.ethereum);
                    signer = provider.getSigner();
                    const address = await signer.getAddress();
                    document.getElementById('accountArea').innerText = "Conectado: " + address;
                    
                    contract = new ethers.Contract(contractAddress, contractABI, signer);
                } else {
                    alert("É necessário instalar o MetaMask!");
                }
            }

            async function transfer() {
                const to = document.getElementById('toWhom').value;
                const amount = document.getElementById('amount').value;
                try {
                    const tx = await contract.transferTo(to, amount);
                    alert("Hash da transação (ENVIADA): " + tx.hash);
                    await tx.wait();
                    alert("Transferência CONFIRMADA!");
                } catch (err) {
                    console.error(err);
                    alert("Erro na transação.");
                }
            }
    
            document.getElementById('connectButton').onclick = connect;
            document.getElementById('transferButton').onclick = transfer;
        </script>
    </body>

</html>
